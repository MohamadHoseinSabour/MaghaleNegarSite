<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>خرید مقاله‌نگار</title>
  <meta name="description" content="صفحه خرید افزونه مقاله‌نگار" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .purchase-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-xl) var(--space-md);
      background: linear-gradient(160deg, #FAF5FF 0%, #EEF2FF 50%, #FDF2F8 100%);
    }
    .purchase-inner { max-width: 520px; margin-inline: auto; }
    .purchase-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      margin-inline: auto;
      margin-bottom: var(--space-md);
      box-shadow: 0 12px 40px rgba(124,58,237,.3);
    }
    .purchase-inner h1 {
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 900;
      margin-bottom: var(--space-sm);
      color: var(--color-fg);
    }
    .purchase-inner p {
      font-size: 17px;
      color: var(--color-fg-muted);
      margin-bottom: var(--space-lg);
      line-height: 1.7;
    }
    .purchase-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(124,58,237,.08); border: 1.5px solid rgba(124,58,237,.2);
      border-radius: 100px; padding: 6px 18px;
      font-size: 13px; font-weight: 600; color: var(--color-primary);
      margin-bottom: var(--space-md);
    }
  </style>
</head>
<body>
  <div class="purchase-page">
    <div class="purchase-inner">
      <div class="purchase-icon" aria-hidden="true">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <path d="M10 12h20M10 19h14M10 26h10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="30" cy="28" r="6" fill="#EC4899"/>
          <path d="M27.5 28l1.5 1.5 3-3" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="purchase-badge">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--color-accent);display:inline-block;"></span>
        به زودی
      </div>
      <h1>صفحه خرید در حال آماده‌سازی است</h1>
      <p>
        به زودی امکان خرید مقاله‌نگار از این صفحه فراهم خواهد شد.<br/>
        برای اطلاع از زمان انتشار، با ما در تماس باشید.
      </p>
      <a href="index.html" class="btn btn-primary btn-lg">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M14.25 9H3.75M8.25 4.5L3.75 9l4.5 4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        بازگشت به صفحه اصلی
      </a>
    </div>
  </div>
</body>
</html>
